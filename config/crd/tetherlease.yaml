---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: tetherleases.
spec:
  group: ""
  names:
    kind: TetherLease
    listKind: TetherLeaseList
    plural: tetherleases
    shortNames:
    - tl
    singular: tetherlease
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: User
          type: string
          jsonPath: .spec.user
        - name: Role
          type: string
          jsonPath: .spec.role
        - name: Cluster
          type: string
          jsonPath: .status.cluster
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Expires
          type: string
          jsonPath: .status.expiresAt
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          description: TetherLease grants time-limited privileged Kubernetes access.
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - user
                - role
                - duration
              properties:
                user:
                  type: string
                  description: Kubernetes principal to grant access to. Must not be a reserved or system principal (for example values prefixed with system:).
                role:
                  type: string
                  description: ClusterRole to bind to the user. Must be one of view, edit, admin, cluster-admin, or match tether-<name>.
                duration:
                  type: string
                  description: Duration for which access is granted. Validation accepts a single Go duration segment (for example "30m", "1h", "45s") and controller policy enforces a minimum of 1m and maximum of 8h.
                  pattern: '^[0-9]+(ns|us|µs|ms|s|m|h)$'
                reason:
                  type: string
                  description: Human-readable explanation for the access request.
                cluster:
                  type: string
                  description: "Cluster is the target cluster name for this lease. When set, the operator creates RBAC bindings in the named cluster. When empty (default), the operator uses the default/local cluster (backward compatible)."
                namespace:
                  type: string
                  description: "Namespace is the target namespace for a RoleBinding. When set, a RoleBinding is created in that namespace instead of a ClusterRoleBinding, reducing blast radius to a single namespace. When empty (default), a ClusterRoleBinding is created (existing behaviour)."
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Active, Expired, Revoked]
                  description: Current lifecycle phase of the lease set by the operator.
                expiresAt:
                  type: string
                  format: date-time
                  description: Time at which the lease expires.
                bindingName:
                  type: string
                  description: Name of the ClusterRoleBinding created for this lease.
                observedGeneration:
                  type: integer
                  format: int64
                  description: Most recent metadata.generation observed by the controller during status reconciliation.
                conditions:
                  type: array
                  description: Standard Kubernetes conditions for the lease. The controller maintains a Ready condition with reasons such as Activated, InvalidRole, InvalidUser, InvalidDuration, DurationTooShort, DurationTooLong, ActivationFailed, Expired, and Revoked.
                  x-kubernetes-list-map-keys:
                    - type
                  x-kubernetes-list-type: map
                  items:
                    type: object
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                        description: Programmatic reason for the condition transition.
                      message:
                        type: string
                        description: Human-readable details for the current condition state.
                cluster:
                  type: string
                  description: "Cluster is the resolved target cluster name where the RBAC binding was created. Used for cleanup during lease expiry/revocation."
                tokenSecret:
                  type: string
                  description: "TokenSecret is the name of the k8s Secret in the tether namespace that holds the session token."



