---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tether-operator
  namespace: tether-system
  labels:
    app.kubernetes.io/name: tether-operator
    app.kubernetes.io/component: operator
    app.kubernetes.io/part-of: tether
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tether-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tether-operator
        app.kubernetes.io/component: operator
        app.kubernetes.io/part-of: tether
    spec:
      serviceAccountName: tether-operator
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
      containers:
        - name: operator
          image: ghcr.io/jaydee94/tether/operator:latest
          imagePullPolicy: IfNotPresent
          args:
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
            - --leader-elect=true
            - --token-namespace=tether-system
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
