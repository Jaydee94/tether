<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#38bdf8" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect x="0" y="0" width="200" height="200" rx="36" ry="36" fill="url(#bgGrad)"/>
  <!-- Chain link 1 -->
  <g transform="translate(62, 72) rotate(-45)" filter="url(#glow)">
    <rect x="-18" y="-10" width="36" height="20" rx="10" ry="10"
          fill="none" stroke="url(#chainGrad)" stroke-width="7"/>
  </g>
  <!-- Chain link 2 -->
  <g transform="translate(138, 128) rotate(-45)" filter="url(#glow)">
    <rect x="-18" y="-10" width="36" height="20" rx="10" ry="10"
          fill="none" stroke="url(#chainGrad)" stroke-width="7"/>
  </g>
  <!-- Connector -->
  <line x1="76" y1="86" x2="124" y2="114"
        stroke="url(#chainGrad)" stroke-width="7" stroke-linecap="round"
        filter="url(#glow)"/>
  <!-- Lock body -->
  <rect x="82" y="97" width="36" height="28" rx="6" ry="6"
        fill="url(#lockGrad)" filter="url(#softShadow)"/>
  <!-- Lock shackle -->
  <path d="M90 97 L90 88 Q100 78 110 88 L110 97"
        fill="none" stroke="url(#lockGrad)" stroke-width="6"
        stroke-linecap="round" stroke-linejoin="round"
        filter="url(#glow)"/>
  <!-- Keyhole -->
  <circle cx="100" cy="109" r="4" fill="#0f172a"/>
  <rect x="98" y="109" width="4" height="7" rx="1" fill="#0f172a"/>
</svg>
