<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e2e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#94a3b8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect x="0" y="0" width="520" height="100" rx="16" ry="16" fill="url(#bgGrad)"/>
  <!-- Icon: chain links -->
  <g transform="translate(30, 37) rotate(-45)" filter="url(#glow)">
    <rect x="-10" y="-6" width="20" height="12" rx="6" ry="6"
          fill="none" stroke="url(#chainGrad)" stroke-width="4"/>
  </g>
  <g transform="translate(70, 63) rotate(-45)" filter="url(#glow)">
    <rect x="-10" y="-6" width="20" height="12" rx="6" ry="6"
          fill="none" stroke="url(#chainGrad)" stroke-width="4"/>
  </g>
  <line x1="38" y1="43" x2="62" y2="57"
        stroke="url(#chainGrad)" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Lock -->
  <rect x="43" y="45" width="18" height="14" rx="3" ry="3" fill="url(#lockGrad)"/>
  <path d="M47 45 L47 40 Q52 34 57 40 L57 45"
        fill="none" stroke="url(#lockGrad)" stroke-width="3"
        stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <circle cx="52" cy="51" r="2" fill="#0f172a"/>
  <rect x="51" y="51" width="2" height="4" rx="0.5" fill="#0f172a"/>
  <!-- Wordmark -->
  <text x="104" y="62" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif"
        font-size="38" font-weight="700" letter-spacing="-2"
        fill="url(#textGrad)">tether</text>
  <!-- Tagline -->
  <text x="104" y="82" font-family="'Inter', -apple-system, sans-serif"
        font-size="13" font-weight="400" letter-spacing="1"
        fill="#475569">KUBERNETES PRIVILEGED ACCESS MANAGEMENT</text>
  <!-- Accent dots -->
  <circle cx="490" cy="38" r="3" fill="url(#accentGrad)" opacity="0.7"/>
  <circle cx="502" cy="38" r="3" fill="url(#chainGrad)" opacity="0.5"/>
  <circle cx="490" cy="50" r="3" fill="url(#lockGrad)" opacity="0.5"/>
  <circle cx="502" cy="50" r="3" fill="url(#accentGrad)" opacity="0.7"/>
  <circle cx="490" cy="62" r="3" fill="url(#chainGrad)" opacity="0.3"/>
  <circle cx="502" cy="62" r="3" fill="url(#lockGrad)" opacity="0.5"/>
</svg>
