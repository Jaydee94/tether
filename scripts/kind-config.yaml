# Kind cluster configuration for Tether local development
# Creates a single-node cluster that exposes a host port for the API server.
#
# Ref: https://kind.sigs.k8s.io/docs/user/configuration/
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: tether-dev
networking:
  # Keep kubeconfig endpoint aligned with API server certificate SANs.
  apiServerAddress: 127.0.0.1
  apiServerPort: 6443
nodes:
  - role: control-plane
    extraMounts:
      - hostPath: /tmp/tether-audit
        containerPath: /tmp/tether-audit
